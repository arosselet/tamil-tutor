name: Anna Knock
# Fires across 3 windows/day; a 4-hour gate in morning_knock.py limits real fires.
# Windows (UTC, EDT = UTC-4):
#   12:00 UTC = 8am EDT  — morning
#   17:00 UTC = 1pm EDT  — afternoon (5h after morning → gate clears at 4h → fires)
#   00:00 UTC = 8pm EDT  — evening   (blocked if afternoon fired <4h ago; fires on missed-afternoon days)
on:
  schedule:
    - cron: "0 12 * * *"      # 8am EDT
    - cron: "0 17 * * *"      # 1pm EDT
    - cron: "0 0  * * *"      # 8pm EDT (midnight UTC)
  workflow_dispatch:
    inputs:
      force:
        description: "Skip the 4-hour gate (manual one-off)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: write              # the knock commits + pushes its mp3 (jsDelivr serves it from main)

jobs:
  knock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Write GCP credentials
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: printf '%s' "$GCP_SA_KEY" > "$RUNNER_TEMP/gcp.json"
      - name: Anna knocks
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ANNA_PUSH_WEBHOOK_URL: ${{ secrets.ANNA_PUSH_WEBHOOK_URL }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcp.json
        run: |
          git config user.name "anna-knock"
          git config user.email "anna@users.noreply.github.com"
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then FORCE_FLAG="--force"; fi
          python scripts/morning_knock.py $FORCE_FLAG
