name: Anna Knock
# The TICK, not the decision. Anna is an agent: the rails gate in morning_knock.py
# (waking hours via America/New_York, ≤3/day, ≥3h apart, + Anna's own next_check)
# cheaply skips most ticks with NO LLM call, and Anna decides fire/silence/modality
# only when a reach is actually possible and due. So this can tick often and cheap.
#
# Ticks ~every 2h across a UTC superset that covers Andrew's 8am–9pm window in both
# EDT and EST; rails_gate does the precise, DST-correct filtering.
on:
  schedule:
    - cron: "0 12,14,16,18,20,22 * * *"   # ~8am–6pm EDT (7am–5pm EST)
    - cron: "0 0 * * *"                    # ~8pm EDT / 7pm EST
  workflow_dispatch:
    inputs:
      force:
        description: "Skip the 4-hour gate (manual one-off)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: write              # the knock commits + pushes its mp3 (jsDelivr serves it from main)

jobs:
  knock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Write GCP credentials
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: printf '%s' "$GCP_SA_KEY" > "$RUNNER_TEMP/gcp.json"
      - name: Anna knocks
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ANNA_PUSH_WEBHOOK_URL: ${{ secrets.ANNA_PUSH_WEBHOOK_URL }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcp.json
        run: |
          git config user.name "anna-knock"
          git config user.email "anna@users.noreply.github.com"
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then FORCE_FLAG="--force"; fi
          python scripts/morning_knock.py $FORCE_FLAG
