name: Log Knock Response
# Triggered by Home Assistant when Andrew taps a button on the knock notification.
# Two taps: 'ack' (got it) and 'listened' (heard the episode). Both mark the knock
# as landed; 'listened' also credits the latest published episode's soak, which
# touches episodes.json + lexicon.json — so all three state files are committed.
on:
  repository_dispatch:
    types: [knock-response]

permissions:
  contents: write

jobs:
  log:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Log response
        run: python scripts/sync_state.py knock-response "${{ github.event.client_payload.response }}"
      - name: Commit
        run: |
          git config user.name "anna-knock"
          git config user.email "anna@users.noreply.github.com"
          # 'listened' surfaces words + bumps listens, so stage the soak files too.
          git add progress/knock_log.json progress/episodes.json progress/learner.json progress/lexicon.json
          git diff --cached --quiet || git commit -m "Knock response: ${{ github.event.client_payload.response }}"
          # main has other writers (the knock workflow, the laptop) — rebase before pushing
          git pull --rebase origin main
          git push origin HEAD:main
