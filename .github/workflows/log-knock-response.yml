name: Log Knock Response
# Triggered by Home Assistant when Andrew responds to the knock notification.
# Taps: 'ack' (got it) / 'listened' (episode soak credit) mark the knock landed.
# 'reply' carries typed Tamil: knock_reply.py judges it against the knock's target,
# moves the production axis, and pushes the recast + deck score back to the phone
# (it owns its own commit+push, same as morning_knock.py).
on:
  repository_dispatch:
    types: [knock-response]

permissions:
  contents: write

jobs:
  log:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Judge Tamil reply
        if: github.event.client_payload.response == 'reply'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ANNA_PUSH_WEBHOOK_URL: ${{ secrets.ANNA_PUSH_WEBHOOK_URL }}
          REPLY_TEXT: ${{ github.event.client_payload.text }}
        run: |
          pip install -r requirements.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          python scripts/knock_reply.py "$REPLY_TEXT"
      - name: Log tap
        if: github.event.client_payload.response != 'reply'
        run: python scripts/sync_state.py knock-response "${{ github.event.client_payload.response }}"
      - name: Commit tap
        if: github.event.client_payload.response != 'reply'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # 'listened' surfaces words + bumps listens, so stage the soak files too.
          git add progress/knock_log.json progress/episodes.json progress/learner.json progress/lexicon.json
          git diff --cached --quiet || git commit -m "Knock response: ${{ github.event.client_payload.response }}"
          # main has other writers (the knock workflow, the laptop) — rebase before pushing
          git pull --rebase origin main
          git push origin HEAD:main
